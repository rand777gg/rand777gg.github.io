short_bio: >-
  <p>
    I’m a passionate and creative front-end developer who loves building little side projects under the “mentorship” of <a href="https://chatgpt.com/" target="_blank">ChatGPT</a> and <a href="https://www.deepseek.com/" target="_blank">DeepSeek</a> — though I’m by no means a professional.ck, tabby, or colourpointed.
  </p>
  <p>
    Of course, I’m also a freshman working at the intersection of medicine and artificial intelligence. My core research focuses on medical image processing and hybrid model generation with a bit of academic tailoring flair. Currently, I’m catching up fiercely on both math and medical knowledge — feel free to reach out by email to share your thoughts or ideas!
  </p>
  <p>
  Beyond academia, I actively contribute to the open-source community. Inspired by projects like <a href="https://csdiy.wiki/" target="_blank">CSDIY</a>, I founded <a href="https://docs.pguide.dev" target="_blank">PGuide Docs</a> to share study notes and resources in computer science. Let’s grow and learn together.
  </p>

